<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>සිංහල AI සහායකයා</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 100%; max-width: 420px; height: 90vh; max-height: 600px; background: white; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; margin: 10px; }
        .chat-header { background: #007bff; color: white; padding: 18px; text-align: center; font-weight: bold; font-size: 1.1rem; }
        .chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #fafafa; }
        .message { padding: 10px 14px; border-radius: 12px; max-width: 75%; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; }
        .user { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot { background: #e4e6eb; color: #1c1e21; align-self: flex-start; border-bottom-left-radius: 2px; }
        .chat-input-area { display: flex; padding: 12px; border-top: 1px solid #eee; background: white; gap: 6px; }
        .chat-input-area input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 20px; outline: none; font-size: 0.95rem; }
        .chat-input-area button { background: #007bff; color: white; border: none; padding: 10px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .clear-btn { background: #dc3545 !important; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">පරිගණක ගැටළු විසඳන සිංහල AI</div>
    <div class="chat-box" id="chatBox"></div>
    <div class="chat-input-area">
        <input type="text" id="userInput" placeholder="ඔබේ ගැටළුව මෙතන ලියන්න..." onkeydown="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">යවන්න</button>
        <button class="clear-btn" onclick="clearChat()">මකන්න</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');

    // 🔴 ඔබේ Gemini API Key එක මෙතනට ඇතුළත් කරන්න 🔴
    const GEMINI_API_KEY = "AQ.Ab8RN6KhDSsBBJDRErlVbouNRXJ16-z3KtHJKT4ig_teHAfjNw"; 
    const GEMINI_API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;

    let chatHistory = JSON.parse(localStorage.getItem('sinhala_chat_history')) || [];
    
    function loadChatHistory() {
        chatBox.innerHTML = '';
        if(chatHistory.length === 0) {
            appendMessage("ආයුබෝවන්! මම පරිගණක සහ තාක්ෂණික ගැටළු විසඳන සිංහල AI සහායකයෙක්. ඔබට ඇති ගැටළුව පවසන්න.", 'bot');
        } else {
            chatHistory.forEach(msg => appendMessage(msg.text, msg.sender));
        }
    }

    function appendMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', sender);
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        chatHistory.push({ text: text, sender: 'user' });
        localStorage.setItem('sinhala_chat_history', JSON.stringify(chatHistory));
        userInput.value = '';

        // Loading indicator
        const loadingDiv = document.createElement('div');
        loadingDiv.classList.add('message', 'bot');
        loadingDiv.innerText = "පිළිතුර සකසමින් පවතී...";
        chatBox.appendChild(loadingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // Gemini API එකට Request එක යැවීම
            const response = await fetch(GEMINI_API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            // AI එකට System Instruction එකක් දෙනවා පරිගණක විශේෂඥයෙක් වගේ සිංහලෙන් උත්තර දෙන්න කියලා
                            text: `You are a helpful computer tech support assistant. Always respond in clear, natural Sinhala language. Answer this user query: ${text}`
                        }]
                    }]
                })
            });

            const data = await response.json();
            chatBox.removeChild(loadingDiv); // Remove loading

            // AI එකෙන් ආපු උත්තරය ලබා ගැනීම
            const botResponse = data.candidates[0].content.parts[0].text;
            
            appendMessage(botResponse, 'bot');
            chatHistory.push({ text: botResponse, sender: 'bot' });
            localStorage.setItem('sinhala_chat_history', JSON.stringify(chatHistory));

        } catch (error) {
            chatBox.removeChild(loadingDiv);
            appendMessage("කණගාටුයි, පිළිතුර ලබා ගැනීමට නොහැකි වුණා. කරුණාකර ඔබගේ API Key එක නිවැරදිදැයි පරීක්ෂා කරන්න.", 'bot');
            console.error(error);
        }
    }

    function clearChat() {
        if(confirm("සැබැවින්ම චැට් ඉතිහාසය මැකීමට අවශ්‍යද?")) {
            localStorage.removeItem('sinhala_chat_history');
            chatHistory = [];
            loadChatHistory();
        }
    }

    loadChatHistory();
</script>

</body>
</html>
