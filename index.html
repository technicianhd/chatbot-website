<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>සිංහල AI සහායකයා</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 100%; max-width: 420px; height: 90vh; max-height: 600px; background: white; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; margin: 10px; }
        .chat-header { background: #007bff; color: white; padding: 18px; text-align: center; font-weight: bold; font-size: 1.1rem; }
        .chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #fafafa; }
        .message { padding: 10px 14px; border-radius: 12px; max-width: 75%; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; }
        .user { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot { background: #e4e6eb; color: #1c1e21; align-self: flex-start; border-bottom-left-radius: 2px; }
        .chat-input-area { display: flex; padding: 12px; border-top: 1px solid #eee; background: white; gap: 6px; }
        .chat-input-area input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 20px; outline: none; font-size: 0.95rem; }
        .chat-input-area button { background: #007bff; color: white; border: none; padding: 10px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .clear-btn { background: #dc3545 !important; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">පරිගණක ගැටළු විසඳන සිංහල AI</div>
    <div class="chat-box" id="chatBox"></div>
    <div class="chat-input-area">
        <input type="text" id="userInput" placeholder="ඔබේ ගැටළුව මෙතන ලියන්න..." onkeydown="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">යවන්න</button>
        <button class="clear-btn" onclick="clearChat()">මකන්න</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');

    // යූසර්ගේ Browser එකේම API Key එක සේဝ် කරලා තියාගන්නවා
    let GEMINI_API_KEY = localStorage.getItem('user_gemini_key') || "";
    let chatHistory = JSON.parse(localStorage.getItem('sinhala_chat_history')) || [];
    
    function loadChatHistory() {
        chatBox.innerHTML = '';
        
        if (!GEMINI_API_KEY) {
            appendMessage("ආයුබෝවන්! චැට් එක පාවිච්චි කරන්න කලින් කරුණාකර ඔබගේ Google Gemini API Key එක ඇතුළත් කරන්න. (මෙය ඔබගේ පරිගණකයේ ආරක්ෂිතව සුරැකේ)", 'bot');
            
            const keyDiv = document.createElement('div');
            keyDiv.style.padding = "10px";
            keyDiv.innerHTML = `
                <input type="password" id="keyInput" placeholder="AIzaSy..." style="width:65%; padding:10px; border-radius:20px; border:1px solid #ddd; outline:none;">
                <button onclick="saveApiKey()" style="padding:10px 15px; background:#28a745; color:white; border:none; border-radius:20px; cursor:pointer; font-weight:bold;">Save Key</button>
            `;
            chatBox.appendChild(keyDiv);
            return;
        }

        if(chatHistory.length === 0) {
            appendMessage("මම පරිගණක සහ තාක්ෂණික ගැටළු විසඳන සිංහල AI සහායකයෙක්. ඔබට ඇති ගැටළුව පවසන්න.", 'bot');
        } else {
            chatHistory.forEach(msg => appendMessage(msg.text, msg.sender));
        }
    }

    function saveApiKey() {
        const key = document.getElementById('keyInput').value.trim();
        if(key) {
            localStorage.setItem('user_gemini_key', key);
            GEMINI_API_KEY = key;
            loadChatHistory();
        }
    }

    function appendMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', sender);
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
const text = userInput.value.trim();
    if (!text || !GEMINI_API_KEY) return;

    // 1. User ge message eka screen ekata dala local storage save kireema
    appendMessage(text, 'user');
    chatHistory.push({ text: text, sender: 'user' });
    localStorage.setItem('sinhala_chat_history', JSON.stringify(chatHistory));
    userInput.value = '';

    // Loading indicator eka
    const loadingDiv = document.createElement('div');
    loadingDiv.classList.add('message', 'bot');
    loadingDiv.innerText = "පිළිතුර සකසමින් පවතී...";
    chatBox.appendChild(loadingDiv);
    chatBox.scrollTop = chatBox.scrollHeight;

    // 2. Chat History eka Gemini API ekata kiyවන්න පුළුවන් විදියට සකස් කිරීම (Formatting)
    // Kalin katha karapu okkoma me `contents` array ekata dapu nisa AI ekata kalin kiyapu dewal mathaka thiyenawa
    let apiContents = [];

    // AI ekata mulinma dena upadesa (System Instruction)
    apiContents.push({
        role: "user",
        parts: [{ text: "You are a helpful computer tech support assistant. Always respond in clear, natural Sinhala language. This is our conversation start." }]
    });
    apiContents.push({
        role: "model",
        parts: [{ text: "Therුනා. මම මින් ඉදිරියට පරිගණක තාක්ෂණික සහායකයෙකු ලෙස සිංහලෙන් පිළිතුරු ලබා දෙන්නම්." }]
    });

    // Chat history eke thiyෙන parana messages tika API format ekata haravima
    chatHistory.forEach(msg => {
        apiContents.push({
            role: msg.sender === 'user' ? 'user' : 'model',
            parts: [{ text: msg.text }]
        });
    });

    const GEMINI_API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;

    try {
        const response = await fetch(GEMINI_API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: apiContents // <-- Methanadi api parana okkoma messages tika yawanawa
            })
        });

        const data = await response.json();
        chatBox.removeChild(loadingDiv);

        if(data.error) {
            appendMessage("Error: " + data.error.message, 'bot');
            return;
        }

        const botResponse = data.candidates[0].content.parts[0].text;
        
        // 3. AI ge pilithura screen ekata dala local storage save kireema
        appendMessage(botResponse, 'bot');
        chatHistory.push({ text: botResponse, sender: 'bot' });
        localStorage.setItem('sinhala_chat_history', JSON.stringify(chatHistory));

    } catch (error) {
        chatBox.removeChild(loadingDiv);
        appendMessage("කණගාටුයි, සම්බන්ධතාවය බිඳ වැටුණා.", 'bot');
        console.error(error);
    }
    }

    function clearChat() {
        if(confirm("චැට් ඉතිහාසය සහ API Key එක සම්පූර්ණයෙන්ම මකා දැමීමට අවශ්‍යද?")) {
            localStorage.clear();
            chatHistory = [];
            GEMINI_API_KEY = "";
            loadChatHistory();
        }
    }

    loadChatHistory();
</script>

</body>
</html>
